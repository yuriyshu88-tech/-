<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#a1d1b9",
                        "on-primary-container": "#9fcfb7",
                        "tertiary-container": "#6c4b00",
                        "background": "#f8faf9",
                        "primary-fixed": "#bcedd4",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f0",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b8cbbf",
                        "on-secondary": "#ffffff",
                        "surface": "#f8faf9",
                        "on-surface": "#191c1c",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1c",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eceeed",
                        "primary": "#134231",
                        "on-tertiary-container": "#edbd6b",
                        "outline": "#717974",
                        "surface-variant": "#e1e3e2",
                        "on-primary-fixed": "#002115",
                        "on-tertiary-fixed": "#271900",
                        "primary-container": "#2d5a47",
                        "on-secondary-fixed": "#0e1f17",
                        "tertiary-fixed": "#ffdeaa",
                        "secondary-container": "#d1e4d8",
                        "surface-container-high": "#e6e9e8",
                        "surface-bright": "#f8faf9",
                        "on-secondary-fixed-variant": "#394b42",
                        "on-primary-fixed-variant": "#214f3d",
                        "on-secondary-container": "#55675d",
                        "inverse-primary": "#a1d1b9",
                        "surface-container-low": "#f2f4f3",
                        "inverse-surface": "#2e3131",
                        "tertiary-fixed-dim": "#efbf6c",
                        "tertiary": "#4f3600",
                        "outline-variant": "#c0c8c2",
                        "secondary": "#516259",
                        "surface-tint": "#3a6753",
                        "surface-container-highest": "#e1e3e2",
                        "surface-dim": "#d8dada",
                        "on-surface-variant": "#414944",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#5f4100",
                        "secondary-fixed": "#d4e7db"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .phase-yellow { background-color: #fff9f0; border: 1px solid #ffdeaa; }
        .phase-green { background-color: #f5fcf8; border: 1px solid #bcedd4; }
        .phase-blue { background-color: #f7f9f8; border: 1px solid #d1e4d8; }
        .day-completed { background-color: #134231; color: #ffffff; }
        
        /* iPhone 17 Pro Max constraints */
        body {
            width: 440px;
            height: 953px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #fcfdfc;
            position: relative;
        }
        .main-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px; /* Space for nav */
        }
    </style>
</head>
<body class="bg-background font-body text-on-background">
<div class="main-container">
<!-- TopAppBar -->
<header class="w-full bg-[#f8faf9]/60 backdrop-blur-md shrink-0">
<div class="flex justify-between items-center px-8 h-16 w-full">
<button class="text-primary opacity-60">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
<h1 class="font-headline font-bold text-xl tracking-wider text-primary">时律</h1>
<button class="text-primary opacity-60">
<span class="material-symbols-outlined text-2xl">redeem</span>
</button>
</div>
</header>
<main class="flex-1 px-8 py-4 space-y-8 overflow-hidden">
<!-- Integrated Progress Section -->
<section class="shrink-0">
<div class="flex justify-between items-end mb-3">
<h2 class="font-headline text-2xl font-extrabold text-primary">本月进度</h2>
<span class="font-label text-xs text-outline font-medium">8 / 21 天已完成</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 38%"></div>
</div>
</section>
<!-- Minimal Calendar Section -->
<section class="bg-white rounded-3xl p-7 border border-outline-variant/30 shadow-sm shrink-0">
<div class="flex items-center justify-between mb-8">
<h3 class="font-headline text-lg font-bold text-on-surface">2024年 5月</h3>
<div class="flex gap-6">
<span class="material-symbols-outlined text-outline text-xl">chevron_left</span>
<span class="material-symbols-outlined text-outline text-xl">chevron_right</span>
</div>
</div>
<div class="grid grid-cols-7 gap-y-4 text-center">
<!-- Weekdays -->
<div class="text-xs font-semibold text-outline-variant pb-2">一</div>
<div class="text-xs font-semibold text-outline-variant pb-2">二</div>
<div class="text-xs font-semibold text-outline-variant pb-2">三</div>
<div class="text-xs font-semibold text-outline-variant pb-2">四</div>
<div class="text-xs font-semibold text-outline-variant pb-2">五</div>
<div class="text-xs font-semibold text-outline-variant pb-2">六</div>
<div class="text-xs font-semibold text-outline-variant pb-2">日</div>
<!-- Calendar Days -->
<div class="aspect-square flex items-center justify-center text-sm text-outline-variant/40">29</div>
<div class="aspect-square flex items-center justify-center text-sm text-outline-variant/40">30</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">1</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">2</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">3</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">4</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">5</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">6</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">7</div>
<div class="aspect-square flex items-center justify-center rounded-xl day-completed text-sm font-bold">8</div>
<div class="aspect-square flex items-center justify-center rounded-xl border-2 border-primary text-primary text-sm font-black bg-primary-fixed/30">9</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-yellow text-sm font-semibold text-on-tertiary-fixed-variant">10</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-yellow text-sm font-semibold text-on-tertiary-fixed-variant">11</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-yellow text-sm font-semibold text-on-tertiary-fixed-variant">12</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">13</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">14</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">15</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">16</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">17</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">18</div>
<div class="aspect-square flex items-center justify-center rounded-xl phase-green text-sm font-semibold text-on-primary-fixed-variant">19</div>
</div>
<div class="mt-8 flex gap-6 justify-center">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#ffdeaa]"></div>
<span class="text-[11px] font-medium text-outline">蓄势</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#bcedd4]"></div>
<span class="text-[11px] font-medium text-outline">精进</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#d1e4d8]"></div>
<span class="text-[11px] font-medium text-outline">巩固</span>
</div>
</div>
</section>
<!-- Lightweight Task Details -->
<section class="space-y-5 shrink-0">
<div class="flex items-baseline gap-3">
<h4 class="font-headline text-xl font-extrabold text-on-surface">5月9日</h4>
<span class="text-[11px] text-primary uppercase font-black tracking-widest opacity-80">蓄势期 PHASE 1</span>
</div>
<div class="space-y-3">
<div class="bg-white p-5 rounded-2xl border border-outline-variant/20 flex items-center gap-5 shadow-sm">
<div class="w-11 h-11 rounded-xl bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">self_improvement</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold text-on-surface mb-0.5">清晨冥想</p>
<p class="text-[11px] text-outline font-medium">15 min · 呼吸调节</p>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
<div class="bg-white p-5 rounded-2xl border border-outline-variant/20 flex items-center gap-5 shadow-sm">
<div class="w-11 h-11 rounded-xl bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">menu_book</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold text-on-surface mb-0.5">核心知识阅读</p>
<p class="text-[11px] text-outline font-medium">45 min · 笔记整理</p>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
</div>
</section>
<!-- Quote Card (Minimized to fit) -->
<div class="relative bg-primary p-7 rounded-3xl overflow-hidden shrink-0">
<div class="relative z-10">
<p class="text-sm text-primary-fixed leading-relaxed opacity-90 font-semibold italic">“每一个标记都是你对自己承诺的见证。”</p>
<button class="mt-4 text-[11px] font-black text-white border-b-2 border-white/40 pb-1 uppercase tracking-wider">查看总结</button>
</div>
<div class="absolute right-0 bottom-0 opacity-10 translate-x-4 translate-y-4">
<span class="material-symbols-outlined text-8xl">eco</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="absolute bottom-0 left-0 w-full h-24 flex justify-around items-center px-10 pb-6 bg-[#f8faf9]/90 backdrop-blur-2xl z-50 border-t border-outline-variant/10">
<button class="flex flex-col items-center justify-center text-primary/40 px-6">
<span class="material-symbols-outlined text-2xl">assignment</span>
<span class="font-label text-[10px] font-bold mt-2 uppercase tracking-tighter">任务</span>
</button>
<button class="flex flex-col items-center justify-center text-primary px-6">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-label text-[10px] font-black mt-2 uppercase tracking-tighter">日历</span>
</button>
<button class="flex flex-col items-center justify-center text-primary/40 px-6">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="font-label text-[10px] font-bold mt-2 uppercase tracking-tighter">我的</span>
</button>
</nav>
</div>
</body></html>
