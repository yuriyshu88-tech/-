<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#2D5A47",
                    "background": "#FFFFFF",
                    "surface": "#FFFFFF",
                    "on-surface": "#1A1C1B",
                    "on-surface-variant": "#5F6360",
                    "outline-light": "#F0F2F0",
                    "accent-soft": "#F8FAF9"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "xl": "1.25rem",
                    "2xl": "1.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 22px;
        }
        body {
            height: 953px; /* iPhone 17 Pro Max target height */
            width: 440px; /* iPhone 17 Pro Max target width */
            margin: 0 auto;
            overflow: hidden; /* Ensure no scrolling */
            background-color: #FFFFFF;
            position: relative;
        }
        .thin-border {
            border: 1px solid #F0F2F0;
        }
        .soft-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body flex flex-col">
<!-- Top Navigation -->
<header class="flex justify-between items-center px-8 h-20 shrink-0">
<button class="w-10 h-10 flex items-center justify-start text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<h1 class="font-headline font-semibold text-lg tracking-tight text-on-surface">时律</h1>
<button class="w-10 h-10 flex items-center justify-end text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content - Compressed to fit exactly in one screen -->
<main class="flex-1 px-8 flex flex-col justify-start">
<!-- Goal Progress -->
<section class="mb-6 shrink-0">
<div class="thin-border rounded-2xl p-6 bg-white soft-shadow">
<div class="flex justify-between items-start mb-4">
<div>
<span class="text-[10px] font-bold tracking-[0.2em] text-on-surface-variant/50 uppercase mb-1 block">Long Term Goal</span>
<h2 class="font-headline font-bold text-2xl text-on-surface">学习流畅粤语</h2>
</div>
<div class="text-right">
<span class="block text-2xl font-light text-primary">64%</span>
<span class="text-[10px] uppercase tracking-tighter text-on-surface-variant/60 font-medium">Progress</span>
</div>
</div>
<div class="w-full h-[3px] bg-accent-soft rounded-full overflow-hidden">
<div class="h-full bg-primary/30 w-[64%]"></div>
</div>
<div class="mt-4 flex items-center justify-between text-[11px] text-on-surface-variant/60 font-medium">
<span class="flex items-center gap-1.5"><span class="material-symbols-outlined !text-sm">event</span> 始于 04.28</span>
<span class="flex items-center gap-1.5"><span class="material-symbols-outlined !text-sm">hourglass_empty</span> 剩余 18 days</span>
</div>
</div>
</section>
<!-- Voice Strategy -->
<section class="mb-6 shrink-0">
<button class="w-full flex items-center justify-between p-4 bg-accent-soft rounded-xl thin-border hover:bg-white transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-white rounded-full flex items-center justify-center thin-border shadow-sm">
<span class="material-symbols-outlined text-primary/60" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="text-left">
<h3 class="text-on-surface font-semibold text-sm">声纹策略校准</h3>
<p class="text-on-surface-variant/60 text-[11px]">即时调整今日任务负荷</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/30 group-hover:translate-x-0.5 transition-transform">arrow_forward_ios</span>
</button>
</section>
<!-- Daily Tasks - Adjusted spacing and simplified to fit height -->
<section class="mb-6 flex-1 flex flex-col">
<div class="flex items-baseline justify-between mb-4 shrink-0">
<h3 class="font-headline font-bold text-xl text-on-surface">今日三要事</h3>
<span class="text-on-surface-variant/40 text-xs font-medium">3 任务待办</span>
</div>
<div class="space-y-3 flex-1">
<!-- Task 1 -->
<div class="p-4 thin-border rounded-xl hover:soft-shadow transition-all group bg-white">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-primary/70 !text-lg">translate</span>
</div>
<h4 class="font-semibold text-sm text-on-surface">粤语常用词汇复习</h4>
</div>
<span class="text-[8px] font-bold text-primary/40 px-2 py-0.5 rounded-md border border-primary/10 tracking-widest uppercase">High</span>
</div>
<div class="flex gap-2">
<button class="flex-1 h-8 bg-primary text-white rounded-lg text-[10px] font-semibold tracking-wide">DONE</button>
<button class="w-10 h-8 bg-accent-soft text-on-surface-variant/40 rounded-lg flex items-center justify-center thin-border">
<span class="material-symbols-outlined !text-base">close</span>
</button>
</div>
</div>
<!-- Task 2 -->
<div class="p-4 thin-border rounded-xl hover:soft-shadow transition-all group bg-white">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-primary/70 !text-lg">podcasts</span>
</div>
<h4 class="font-semibold text-sm text-on-surface">播客精听：香港往事</h4>
</div>
<span class="text-[8px] font-bold text-on-surface-variant/40 px-2 py-0.5 rounded-md border border-on-surface-variant/10 tracking-widest uppercase">Mid</span>
</div>
<div class="flex gap-2">
<button class="flex-1 h-8 bg-primary text-white rounded-lg text-[10px] font-semibold tracking-wide">DONE</button>
<button class="w-10 h-8 bg-accent-soft text-on-surface-variant/40 rounded-lg flex items-center justify-center thin-border">
<span class="material-symbols-outlined !text-base">close</span>
</button>
</div>
</div>
<!-- Task 3 -->
<div class="p-4 thin-border rounded-xl hover:soft-shadow transition-all group bg-white">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-primary/70 !text-lg">record_voice_over</span>
</div>
<h4 class="font-semibold text-sm text-on-surface">模仿影子练习</h4>
</div>
<span class="text-[8px] font-bold text-on-surface-variant/40 px-2 py-0.5 rounded-md border border-on-surface-variant/10 tracking-widest uppercase">Focus</span>
</div>
<div class="flex gap-2">
<button class="flex-1 h-8 bg-primary text-white rounded-lg text-[10px] font-semibold tracking-wide">START</button>
<button class="w-10 h-8 bg-accent-soft text-on-surface-variant/40 rounded-lg flex items-center justify-center thin-border">
<span class="material-symbols-outlined !text-base">close</span>
</button>
</div>
</div>
</div>
</section>
<!-- Quote/Growth - Simplified to save space -->
<section class="grid grid-cols-2 gap-4 mb-24 shrink-0">
<div class="p-4 bg-accent-soft/50 rounded-2xl thin-border flex flex-col justify-center">
<p class="text-[12px] text-on-surface font-light italic leading-snug">“语言是文化的地图。”</p>
</div>
<div class="p-4 thin-border rounded-2xl flex flex-col items-center justify-center text-center">
<span class="text-[9px] uppercase tracking-widest text-on-surface-variant/40 font-bold mb-1">Growth</span>
<span class="text-xl font-headline font-bold text-primary">+42</span>
</div>
</section>
</main>
<!-- Navigation Bar - Fixed at bottom -->
<nav class="absolute bottom-0 left-0 w-full px-10 pb-8 pt-4 bg-white/90 backdrop-blur-md flex justify-between items-center thin-border-t">
<a class="flex flex-col items-center gap-1.5 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="text-[10px] font-semibold uppercase tracking-wider">Tasks</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-on-surface-variant/30 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Calendar</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-on-surface-variant/30 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
</a>
</nav>
<!-- Safe Area Indicator -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-on-surface/10 rounded-full"></div>
</body></html>
