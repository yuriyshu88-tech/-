<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#a1d1b9",
                    "on-primary-container": "#9fcfb7",
                    "tertiary-container": "#6c4b00",
                    "background": "#f8faf9",
                    "primary-fixed": "#bcedd4",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#eff1f0",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#b8cbbf",
                    "on-secondary": "#ffffff",
                    "surface": "#f8faf9",
                    "on-surface": "#191c1c",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#191c1c",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#eceeed",
                    "primary": "#134231",
                    "on-tertiary-container": "#edbd6b",
                    "outline": "#717974",
                    "surface-variant": "#e1e3e2",
                    "on-primary-fixed": "#002115",
                    "on-tertiary-fixed": "#271900",
                    "primary-container": "#2d5a47",
                    "on-secondary-fixed": "#0e1f17",
                    "tertiary-fixed": "#ffdeaa",
                    "secondary-container": "#d1e4d8",
                    "surface-container-high": "#e6e9e8",
                    "surface-bright": "#f8faf9",
                    "on-secondary-fixed-variant": "#394b42",
                    "on-primary-fixed-variant": "#214f3d",
                    "on-secondary-container": "#55675d",
                    "inverse-primary": "#a1d1b9",
                    "surface-container-low": "#f2f4f3",
                    "inverse-surface": "#2e3131",
                    "tertiary-fixed-dim": "#efbf6c",
                    "tertiary": "#4f3600",
                    "outline-variant": "#c0c8c2",
                    "secondary": "#516259",
                    "surface-tint": "#3a6753",
                    "surface-container-highest": "#e1e3e2",
                    "surface-dim": "#d8dada",
                    "on-surface-variant": "#414944",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#5f4100",
                    "secondary-fixed": "#d4e7db"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "2xl": "2rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .voice-pulse {
            box-shadow: 0 0 0 0 rgba(239, 191, 108, 0.4);
            background: rgba(239, 191, 108, 0.05);
        }
        body {
            width: 440px;
            height: 953px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #f8faf9;
            position: relative;
        }
        .ios-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 34px);
            padding-top: env(safe-area-inset-top, 47px);
        }
    </style>
</head>
<body class="font-body text-on-surface selection:bg-primary-fixed-dim">
<div class="ios-content">
<!-- Header -->
<header class="flex justify-between items-center px-8 h-20 shrink-0">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="close">close</span>
</button>
<h1 class="font-headline font-bold text-2xl tracking-tight text-[#2D5A47]">时律</h1>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="help_outline">help_outline</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col px-8 overflow-hidden">
<div class="mt-8 mb-10">
<span class="inline-block px-4 py-1.5 bg-secondary-container text-on-secondary-container text-[11px] font-bold uppercase tracking-widest rounded-full mb-5">
                NEW GOAL
            </span>
<h2 class="font-headline font-extrabold text-[40px] text-primary leading-[1.1] tracking-tight">
                开始你的长期目标
            </h2>
<p class="mt-4 text-on-surface-variant font-medium text-base leading-relaxed max-w-[90%]">
                描绘一段旅程，而不是一个任务。请详细说明你想在接下来的几个月中成就什么。
            </p>
</div>
<div class="flex-grow flex flex-col space-y-10">
<!-- Text Area -->
<div class="relative flex-grow min-h-0 flex flex-col">
<textarea class="w-full flex-grow bg-surface-container-lowest p-8 rounded-[2.5rem] text-xl text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary-fixed-dim border-0 shadow-[0_12px_40px_rgba(45,90,71,0.04)] resize-none transition-all duration-300" placeholder="例如：在六个月内掌握自由泳技术，并完成一次1.5公里的公开水域游泳..."></textarea>
<div class="absolute bottom-6 right-6">
<div class="flex items-center gap-2.5 px-4 py-2 rounded-full bg-surface-container-low/80 backdrop-blur text-on-surface-variant text-[14px] font-semibold">
<span class="material-symbols-outlined text-[18px]" data-icon="text_fields">text_fields</span>
<span>124 词</span>
</div>
</div>
</div>
<!-- Voice / Interaction Area -->
<div class="flex flex-col items-center shrink-0 space-y-4 pb-8">
<div class="relative flex items-center justify-center">
<div class="absolute w-24 h-24 rounded-full voice-pulse animate-pulse"></div>
<button class="relative z-10 w-16 h-16 bg-tertiary-fixed-dim text-on-tertiary-fixed rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<p class="text-[12px] font-bold uppercase tracking-[0.15em] text-on-tertiary-fixed-variant opacity-70">
                    点击开启语音灵感
                </p>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-8 pt-4 shrink-0">
<div class="max-w-2xl mx-auto">
<button class="w-full py-6 px-8 rounded-full bg-gradient-to-b from-primary-container to-primary text-white font-headline font-bold text-lg uppercase tracking-[0.05em] shadow-[0_16px_48px_rgba(45,90,71,0.2)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-4">
<span>创建长期目标</span>
<span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="mt-6 text-center">
<p class="text-[10px] text-outline/60 uppercase tracking-tight">
                    点击创建即表示你承诺开启这段专注之旅
                </p>
</div>
</div>
</footer>
</div>
<!-- Background Accents -->
<div class="fixed top-32 -left-20 w-80 h-80 bg-primary-fixed-dim/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-32 -right-20 w-96 h-96 bg-tertiary-fixed-dim/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
