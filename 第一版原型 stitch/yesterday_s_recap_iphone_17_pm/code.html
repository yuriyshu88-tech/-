<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#a1d1b9",
                        "on-primary-container": "#9fcfb7",
                        "tertiary-container": "#6c4b00",
                        "background": "#FDFEFE",
                        "primary-fixed": "#bcedd4",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f0",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b8cbbf",
                        "on-secondary": "#ffffff",
                        "surface": "#FDFEFE",
                        "on-surface": "#191c1c",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1c",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#F1F5F3",
                        "primary": "#2D5A47",
                        "on-tertiary-container": "#edbd6b",
                        "outline": "#717974",
                        "surface-variant": "#e1e3e2",
                        "on-primary-fixed": "#002115",
                        "on-tertiary-fixed": "#271900",
                        "primary-container": "#2d5a47",
                        "on-secondary-fixed": "#0e1f17",
                        "tertiary-fixed": "#ffdeaa",
                        "secondary-container": "#E8F2ED",
                        "surface-container-high": "#EBF0EE",
                        "surface-bright": "#FDFEFE",
                        "on-secondary-fixed-variant": "#394b42",
                        "on-primary-fixed-variant": "#214f3d",
                        "on-secondary-container": "#516259",
                        "inverse-primary": "#a1d1b9",
                        "surface-container-low": "#F7F9F8",
                        "inverse-surface": "#2e3131",
                        "tertiary-fixed-dim": "#efbf6c",
                        "tertiary": "#4f3600",
                        "outline-variant": "#c0c8c2",
                        "secondary": "#516259",
                        "surface-tint": "#3a6753",
                        "surface-container-highest": "#e1e3e2",
                        "surface-dim": "#d8dada",
                        "on-surface-variant": "#5F6B65",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#5f4100",
                        "secondary-fixed": "#d4e7db"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            height: 953px;
            width: 440px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }
        .ios-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .task-card {
            transition: transform 0.2s ease;
        }
        .task-card:active {
            transform: scale(0.98);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body">
<div class="ios-content">
<!-- Top Bar -->
<header class="pt-14 pb-2 px-8 flex justify-between items-center shrink-0">
<div class="w-10"></div>
<h1 class="text-primary font-headline font-extrabold text-xl tracking-tight">时律</h1>
<div class="w-10 flex justify-end">
<span class="material-symbols-outlined text-primary/80 text-2xl" data-icon="redeem">redeem</span>
</div>
</header>
<main class="flex-grow px-8 flex flex-col justify-between overflow-hidden py-4">
<!-- Hero Section -->
<div class="mb-4 shrink-0">
<p class="font-label text-primary/60 font-semibold tracking-widest uppercase text-[10px] mb-2">昨日回顾</p>
<h2 class="font-headline text-[28px] font-bold text-on-surface leading-tight tracking-tight">先确认一下昨天的进度</h2>
<div class="mt-4 h-[3px] w-8 bg-primary/20 rounded-full"></div>
</div>
<!-- Content Area - Fixed height or flex-grow based on space -->
<div class="flex-grow flex flex-col justify-center gap-6">
<!-- Task Card 1 -->
<div class="task-card bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10 shadow-sm">
<div class="flex justify-between items-start mb-6">
<div class="flex-1">
<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-secondary-container/50 text-on-secondary-container uppercase tracking-wider mb-2">
                                个人提升
                            </span>
<h3 class="text-lg font-bold font-headline text-on-surface">每日冥想 20 分钟</h3>
<p class="text-on-surface-variant text-xs mt-1 opacity-70">原定于昨日 18:00 完成</p>
</div>
<span class="material-symbols-outlined text-primary/30" data-icon="self_improvement">self_improvement</span>
</div>
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl bg-primary text-white font-label text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 shadow-md shadow-primary/10">
<span class="material-symbols-outlined text-sm" data-icon="check_circle">check_circle</span>
                            完成
                        </button>
<button class="flex-1 py-3 px-4 rounded-xl bg-white text-on-secondary-container font-label text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 border border-outline-variant/20">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
                            忽略
                        </button>
</div>
</div>
<!-- Task Card 2 -->
<div class="task-card bg-white p-5 rounded-2xl border border-outline-variant/15 flex items-center gap-5">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary/60 text-2xl" data-icon="menu_book">menu_book</span>
</div>
<div class="flex-grow">
<h3 class="text-md font-bold font-headline text-on-surface">阅读《深向工作》第3章</h3>
<p class="text-on-surface-variant text-[11px] mt-0.5">进度：已阅读 60%</p>
</div>
<div class="flex flex-col gap-1.5">
<button class="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-xl" data-icon="check">check</span>
</button>
</div>
</div>
<!-- Visual Element -->
<div class="rounded-2xl overflow-hidden aspect-[16/7] relative border border-outline-variant/10 group shrink-0">
<img alt="Subtle forest" class="w-full h-full object-cover opacity-60 grayscale-[30%]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANjqf9bztXdgoSEl6y7fa4jpfnFEKCYo7Phxdw6x1cDnp1tEOHCMQBwyKtyYhpxSqquUv0z4xqwk7gCrv5cv9Q26tqoFyeDr6Wj9jox9XM33SrAoL9D6C-sWA0E6U_0ZUXlG4-u29SsqVyvzyNWvXrZ1pQXmii2sA3YfIIfur8lZ3cLImmqE3pxzBzfURpOOIOiPL3MmOj4eDYOvCgWv7IbuftJLLzEKZFoMd5h-IYvCUAnGQ74zRZvdXXQxvahYfulqPWNjdDUIdu"/>
<div class="absolute inset-0 bg-gradient-to-t from-white/40 to-transparent flex items-end p-5">
<p class="text-on-surface/80 font-headline font-semibold text-xs italic leading-relaxed">
                            “每一个被确认的足迹，都是向卓越迈进的基石。”
                        </p>
</div>
</div>
</div>
</main>
<!-- Bottom Action -->
<footer class="w-full px-8 pb-10 pt-4 shrink-0">
<button class="w-full py-5 rounded-2xl bg-primary text-white font-label text-sm font-bold uppercase tracking-[0.15em] shadow-xl shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all">
                确认并开启今日
            </button>
<!-- Home Indicator -->
<div class="mt-8 w-32 h-1.5 bg-on-surface/10 mx-auto rounded-full"></div>
</footer>
</div>
</body></html>
