<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>时律 - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed-dim": "#a1d1b9",
                      "on-primary-container": "#9fcfb7",
                      "tertiary-container": "#6c4b00",
                      "background": "#f8faf9",
                      "primary-fixed": "#bcedd4",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#eff1f0",
                      "on-primary": "#ffffff",
                      "secondary-fixed-dim": "#b8cbbf",
                      "on-secondary": "#ffffff",
                      "surface": "#f8faf9",
                      "on-surface": "#191c1c",
                      "surface-container-lowest": "#ffffff",
                      "on-background": "#191c1c",
                      "error": "#ba1a1a",
                      "on-tertiary": "#ffffff",
                      "surface-container": "#eceeed",
                      "primary": "#2D5A47",
                      "on-tertiary-container": "#edbd6b",
                      "outline": "#717974",
                      "surface-variant": "#e1e3e2",
                      "on-primary-fixed": "#002115",
                      "on-tertiary-fixed": "#271900",
                      "primary-container": "#2d5a47",
                      "on-secondary-fixed": "#0e1f17",
                      "tertiary-fixed": "#ffdeaa",
                      "secondary-container": "#d1e4d8",
                      "surface-container-high": "#e6e9e8",
                      "surface-bright": "#f8faf9",
                      "on-secondary-fixed-variant": "#394b42",
                      "on-primary-fixed-variant": "#214f3d",
                      "on-secondary-container": "#55675d",
                      "inverse-primary": "#a1d1b9",
                      "surface-container-low": "#f2f4f3",
                      "inverse-surface": "#2e3131",
                      "tertiary-fixed-dim": "#efbf6c",
                      "tertiary": "#4f3600",
                      "outline-variant": "#c0c8c2",
                      "secondary": "#516259",
                      "surface-tint": "#3a6753",
                      "surface-container-highest": "#e1e3e2",
                      "surface-dim": "#d8dada",
                      "on-surface-variant": "#414944",
                      "on-error": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#5f4100",
                      "secondary-fixed": "#d4e7db"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faf9;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 440px;
            height: 953px;
        }
        .brand-headline {
            font-family: 'Manrope', sans-serif;
        }
        /* Lock dimensions for iPhone 17 Pro Max */
        .device-container {
            width: 440px;
            height: 953px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#f8faf9] flex items-center justify-center">
<!-- iPhone 17 Pro Max Container (440 x 953) -->
<main class="device-container flex flex-col items-center justify-between py-32 px-8">
<!-- Top spacer for balanced white space -->
<div class="h-32"></div>
<!-- Logo & Branding Cluster - Centered vertically in the layout -->
<div class="relative z-10 flex flex-col items-center justify-center">
<div class="text-center">
<h1 class="brand-headline text-8xl font-extrabold tracking-tighter text-primary mb-8">
                    时律
                </h1>
<p class="brand-headline text-primary/50 font-semibold tracking-[0.6em] text-base uppercase ml-[0.6em]">
                    把想做的，做到。
                </p>
</div>
</div>
<!-- Minimal Loading / Footer State -->
<div class="w-full max-w-[200px] flex flex-col items-center space-y-8 mb-12">
<div class="w-20 h-[3px] bg-secondary-container/40 rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-primary/40 rounded-full animate-pulse"></div>
</div>
<span class="text-[11px] font-bold text-primary/30 uppercase tracking-[0.3em] font-label text-center">
                Initializing Sanctuary
            </span>
</div>
</main>
</body></html>
